# --- Email (.env: load with DotEnvLoader; restart Spring Boot after changing .env) ---
# Gmail 587: SMTP_HOST=smtp.gmail.com SMTP_PORT=587 SMTP_SECURE=false SMTP_USER=... SMTP_PASS=app-password
# Optional display name: SMTP_FROM="EPMS HR <user@gmail.com>"
spring.mail.host=${SMTP_HOST:${MAIL_HOST:}}
spring.mail.port=${SMTP_PORT:${MAIL_PORT:587}}
spring.mail.username=${SMTP_USER:${MAIL_USERNAME:}}
spring.mail.password=${SMTP_PASS:${MAIL_PASSWORD:}}
app.mail.from=${SMTP_FROM:${SMTP_USER:${MAIL_USERNAME:no-reply@epms.local}}}
# Gmail 587: STARTTLS (TLS). Do not set implicit SSL here; use port 465 + ssl only if your provider requires SMTPS.
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
# Port 587: STARTTLS — matches SMTP_PORT=587 and SMTP_SECURE=false in .env
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}
# Cert trust: smtp.gmail.com for Google; * works for many dev setups
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST:*}
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000